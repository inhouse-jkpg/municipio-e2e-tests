name: Unit Tests
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Setup PHP 
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Install dependencies
        run: composer i

      - name: Run Test
        run: composer test